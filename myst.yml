version: 1
project:
  title: Pyomo.DoE Workshop and Tutorials
  authors:
    - name: Alexander Dowling
    - name: Dan Laky
    - name: Stephen Cini
    - name: Shammah Lilonfe
    - name: Shuvashish Mondal
    - name: Shilpa Narasimhan
  exclude:
    - .DS_Store
    - '**.ipynb_checkpoints'
    - '**.pytest_cache'
  github: dowlinglab/pyomo-doe
  toc:
    - file: Readme.md
    - file: tclab.md
      children:
        - file: notebooks/tclab_model.ipynb
        - file: notebooks/numpy_simulation.ipynb
        - file: notebooks/pyomo_simulation.ipynb
    - file: notebooks/experiment_abstraction.ipynb
    - file: regression.md
      children:
        - file: notebooks/parmest.ipynb
        - file: notebooks/uncertainty_quantification.ipynb
        - file: notebooks/parmest_multistart_profilelikelihood.ipynb
        - file: notebooks/parmest_regularization.ipynb
        # - file: notebooks/parmest_exercise.ipynb
    - file: mbdoe.md
      children:
        # - file: notebooks/doe_exploratory_analysis.ipynb
        # - file: notebooks/doe_optimize.ipynb
        - file: notebooks/doe_optimize_pseudo_A.ipynb
        - file: notebooks/doe_optimize_ACC_2026.ipynb
        - file: notebooks/tclab_multiexperiment.ipynb
        # - file: notebooks/doe_exercise.ipynb
    - file: exercises.md
      children:
        - file: exercise_solutions/parmest_exercise.ipynb
        - file: exercise_solutions/doe_exercise.ipynb
site:
  template: themes/pyomo-book-theme-dist
  options:
    logo: PyomoDoE-sm.png
    folders: true
